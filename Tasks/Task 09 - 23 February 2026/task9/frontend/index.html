<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Library Management System</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#f9fafb', 100: '#f3f4f6', 500: '#374151', 600: '#000000', 700: '#000000', 900: '#000000', dark: '#ffffff' },
                        surface: { dark: '#000000', card: '#111111', border: '#333333' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-[#f4f6f8] text-gray-900 dark:bg-surface-dark dark:text-white min-h-screen transition-colors duration-200 overflow-hidden flex">

    <!-- Mobile Sidebar Overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-gray-900 bg-opacity-50 z-40 hidden lg:hidden"></div>

    <!-- Sidebar Navigation -->
    <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 z-50 w-64 bg-white dark:bg-surface-card border-r border-gray-200 dark:border-surface-border transform -translate-x-full lg:translate-x-0 transition-transform duration-300 flex flex-col">
        <div class="h-16 flex items-center px-6 border-b border-gray-200 dark:border-surface-border">
            <span class="font-bold text-xl tracking-tight text-gray-900 dark:text-white">LMS</span>
        </div>
        
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <a href="index.html" class="flex items-center px-4 py-3 bg-primary-50 text-black dark:text-gray-300 dark:bg-primary-900/30 dark:text-primary-400 rounded-xl font-medium transition-colors">
                Dashboard
            </a>
            <a href="books.html" class="flex items-center px-4 py-3 text-gray-600 hover:bg-[#f4f6f8] hover:text-gray-900 dark:text-gray-400 dark:hover:bg-surface-border/50 dark:hover:text-white rounded-xl font-medium transition-colors">
                Books Inventory
            </a>
            <a href="members.html" class="flex items-center px-4 py-3 text-gray-600 hover:bg-[#f4f6f8] hover:text-gray-900 dark:text-gray-400 dark:hover:bg-surface-border/50 dark:hover:text-white rounded-xl font-medium transition-colors">
                Members Directory
            </a>
            <a href="issue-return.html" class="flex items-center px-4 py-3 text-gray-600 hover:bg-[#f4f6f8] hover:text-gray-900 dark:text-gray-400 dark:hover:bg-surface-border/50 dark:hover:text-white rounded-xl font-medium transition-colors">
                Issue & Return
            </a>
        </nav>

        <div class="p-4 border-t border-gray-200 dark:border-surface-border">
            <button id="logout-btn" class="flex items-center w-full px-4 py-3 text-red-600 hover:bg-red-50 dark:text-red-400 dark:hover:bg-red-900/20 rounded-xl font-medium transition-colors">
                Sign Out
            </button>
        </div>
    </aside>

    <!-- Main Content Wrapper -->
    <div class="flex-1 flex flex-col min-w-0 h-screen overflow-hidden">
        
        <!-- Top Header -->
        <header class="bg-white dark:bg-surface-card border-b border-gray-200 dark:border-surface-border h-16 flex items-center justify-between px-4 sm:px-6 lg:px-8 shrink-0">
            <div class="flex items-center">
                <button id="mobile-menu-btn" class="lg:hidden text-gray-500 hover:text-black dark:text-gray-400 dark:hover:text-white focus:outline-none p-2 mr-3 rounded-lg hover:bg-gray-200 dark:hover:bg-white/10 transition-colors"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
                <nav class="hidden sm:flex" aria-label="Breadcrumb">
                    <ol class="flex items-center space-x-2">
                        <li><span class="text-sm font-medium text-gray-500 dark:text-gray-400">LMS</span></li>
                        <li></li>
                        <li><span class="text-sm font-semibold text-gray-900 dark:text-white">Dashboard</span></li>
                    </ol>
                </nav>
            </div>
            <div class="flex items-center space-x-4">
                <button id="theme-toggle" class="text-gray-900 hover:text-gray-600 dark:text-white dark:hover:text-gray-300 p-2 rounded-lg transition-colors"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden dark:block"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="block dark:hidden"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></button>
                
            </div>
        </header>

        <!-- Main Scrollable Area -->
        <main class="flex-1 overflow-y-auto bg-[#f4f6f8] dark:bg-surface-dark p-4 sm:p-6 lg:p-8">
            <div class="max-w-6xl mx-auto">
                
                <div class="mb-8">
                    <h2 class="text-2xl font-bold leading-7 text-gray-900 dark:text-white sm:text-3xl sm:truncate">System Overview</h2>
                    <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">High-level metrics and recent administrative activity.</p>
                </div>

                <!-- Stats Grid -->
                <div class="grid grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-4 mb-8">
                    <!-- Total Books -->
                    <div class="bg-white dark:bg-surface-card rounded-2xl shadow-sm border border-gray-100 dark:border-surface-border p-6 flex flex-col justify-between hidden-init">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-sm font-medium text-gray-500 dark:text-gray-400">Total Books</h3>
                            <div class="p-2 bg-blue-50 dark:bg-blue-900/20 rounded-lg text-blue-600 dark:text-blue-400"></div>
                        </div>
                        <div class="text-3xl font-bold text-gray-900 dark:text-white" id="stat-total-books">-</div>
                    </div>

                    <!-- Available Books -->
                    <div class="bg-white dark:bg-surface-card rounded-2xl shadow-sm border border-gray-100 dark:border-surface-border p-6 flex flex-col justify-between hidden-init">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-sm font-medium text-gray-500 dark:text-gray-400">Available</h3>
                            <div class="p-2 bg-green-50 dark:bg-green-900/20 rounded-lg text-green-600 dark:text-green-400"></div>
                        </div>
                        <div class="text-3xl font-bold text-gray-900 dark:text-white" id="stat-available-books">-</div>
                    </div>

                    <!-- Total Members -->
                    <div class="bg-white dark:bg-surface-card rounded-2xl shadow-sm border border-gray-100 dark:border-surface-border p-6 flex flex-col justify-between hidden-init">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-sm font-medium text-gray-500 dark:text-gray-400">Members</h3>
                            <div class="p-2 bg-purple-50 dark:bg-purple-900/20 rounded-lg text-purple-600 dark:text-purple-400"></div>
                        </div>
                        <div class="text-3xl font-bold text-gray-900 dark:text-white" id="stat-total-members">-</div>
                    </div>

                    <!-- Active Issues -->
                    <div class="bg-white dark:bg-surface-card rounded-2xl shadow-sm border border-gray-100 dark:border-surface-border p-6 flex flex-col justify-between hidden-init">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-sm font-medium text-gray-500 dark:text-gray-400">Active Issues</h3>
                            <div class="p-2 bg-orange-50 dark:bg-orange-900/20 rounded-lg text-orange-600 dark:text-orange-400"></div>
                        </div>
                        <div class="text-3xl font-bold text-gray-900 dark:text-white" id="stat-active-issues">-</div>
                    </div>
                </div>

                <!-- Recent Activity Table -->
                <div class="bg-white dark:bg-surface-card rounded-2xl shadow-sm border border-gray-100 dark:border-surface-border overflow-hidden">
                    <div class="px-6 py-5 border-b border-gray-100 dark:border-surface-border">
                        <h3 class="text-base font-semibold text-gray-900 dark:text-white">Recent Transactions</h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200 dark:divide-surface-border">
                            <thead class="bg-[#f4f6f8]/50 dark:bg-black">
                                <tr>
                                    <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Book Name</th>
                                    <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Member</th>
                                    <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Dates</th>
                                    <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Status</th>
                                </tr>
                            </thead>
                            <tbody id="recent-activity-tbody" class="divide-y divide-gray-100 dark:divide-surface-border">
                                <tr>
                                    <td colspan="4" class="px-6 py-12 text-center text-sm text-gray-500 dark:text-gray-400">
                                        Loading activity stream...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col items-end space-y-2"></div>
    <script src="assets/js/common.js" defer></script>
    <script src="assets/js/dashboard.js" defer></script>
</body>
</html>
