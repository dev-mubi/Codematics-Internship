<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System - Admin Login</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#f9fafb', 100: '#f3f4f6', 500: '#374151', 600: '#000000', 700: '#000000', 900: '#000000' },
                        surface: { dark: '#000000', card: '#111111', border: '#333333' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Georgia', 'serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-[#f4f6f8] text-gray-900 dark:bg-surface-dark dark:text-gray-100 min-h-screen flex transition-colors duration-200">

    <!-- Theme Toggle -->
    <div class="fixed top-6 right-6 z-50">
        <button id="theme-toggle" class="text-gray-500 hover:text-black dark:text-gray-400 dark:hover:text-white p-2 rounded-full hover:bg-gray-200 dark:hover:bg-white/10 transition-colors focus:outline-none">
            <!-- Moon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden dark:block"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            <!-- Sun -->
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="block dark:hidden"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        </button>
    </div>

    <div class="flex w-full">
        <!-- Left Side: Typographic Quote Setup -->
        <div class="hidden lg:flex lg:flex-col lg:w-1/2 bg-black dark:bg-[#0a0a0a] text-white p-16 justify-between border-r border-gray-800">
            <div>
                <h2 class="text-2xl font-bold tracking-tight">Library Management System</h2>
            </div>
            
            <div class="max-w-md">
                <blockquote class="text-4xl font-serif leading-tight mb-6">
                    "A library is not a luxury but one of the necessities of life."
                </blockquote>
                <p class="text-gray-400 font-medium tracking-wide uppercase text-sm">— Henry Ward Beecher</p>
            </div>
            
            <div class="text-sm text-gray-500">
                &copy; Codematics Internship Task 09 - Mubashir Shahzaib
            </div>
        </div>

        <!-- Right Side: Login -->
        <div class="flex-1 flex flex-col justify-center px-4 sm:px-6 lg:px-20 xl:px-24 bg-white dark:bg-black">
            <div class="mx-auto w-full max-w-sm lg:w-96">
                
                <div class="mb-10 lg:hidden">
                    <h2 class="text-2xl font-bold tracking-tight text-black dark:text-white">Library Management System</h2>
                </div>

                <div>
                    <h1 class="text-3xl font-extrabold text-black dark:text-white mb-2">Sign in</h1>
                    <p class="text-sm text-gray-500 dark:text-gray-400">
                        Use your assigned administrative credentials. Local backend must be running.
                    </p>
                </div>

                <div class="mt-8">
                    <form id="login-form" class="space-y-6">
                        <div id="login-error" class="hidden p-4 rounded bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-400 text-sm font-medium border-l-4 border-red-500">
                        </div>

                        <div>
                            <label for="username" class="block text-sm font-medium text-black dark:text-gray-200">Admin Username</label>
                            <div class="mt-1">
                                <input type="text" id="username" required autocomplete="username" class="appearance-none block w-full px-4 py-3 border border-gray-300 dark:border-surface-border rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-black focus:border-black dark:focus:ring-white dark:focus:border-white dark:bg-[#111] dark:text-white sm:text-sm transition-colors" placeholder="e.g. admin">
                            </div>
                        </div>

                        <div>
                            <label for="password" class="block text-sm font-medium text-black dark:text-gray-200">Password</label>
                            <div class="mt-1">
                                <input type="password" id="password" required autocomplete="current-password" class="appearance-none block w-full px-4 py-3 border border-gray-300 dark:border-surface-border rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-black focus:border-black dark:focus:ring-white dark:focus:border-white dark:bg-[#111] dark:text-white sm:text-sm transition-colors" placeholder="••••••••">
                            </div>
                        </div>

                        <div>
                            <button type="submit" id="login-btn" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white dark:text-black bg-black dark:bg-white hover:bg-gray-800 dark:hover:bg-gray-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-black dark:focus:ring-offset-black transition-colors">
                                Access Dashboard
                            </button>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col items-end space-y-2 pointer-events-none"></div>

    <script src="assets/js/common.js" defer></script>
    <script src="assets/js/login.js" defer></script>
</body>
</html>
